<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nova Product</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="product-page">

  <div class="container product-page-grid">

    <!-- IMAGE -->

    <div class="product-page-image">

      <img
        id="productImage"
        src=""
        alt="Product"
      >

    </div>

    <!-- INFO -->

    <div class="product-page-info">

      <div class="tag">
        Nova Apparel
      </div>

      <h1 id="productTitle"></h1>

      <div class="price-box">

        <span class="old-price" id="oldPrice"></span>

        <span class="new-price" id="newPrice"></span>

        <span class="discount-badge" id="discount"></span>

      </div>

      <p id="productDescription"></p>

      <div class="product-features">

        <div>✔ Premium Quality</div>
        <div>✔ Luxury Aesthetic</div>
        <div>✔ Comfortable Wear</div>
        <div>✔ Fast Delivery</div>

      </div>

      <button
        class="btn buy-big-btn"
        id="buyButton"
      >
        Buy On WhatsApp
      </button>

    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
